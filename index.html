<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TOSH-X-BOT | Premium Terminal</title>
    </head>
<body>

    <header>
        </header>

    <div class="bot-grid" id="bot-container">
        </div>

    <script type="module">
        import { botConfigs } from './src/bots.js';

        const container = document.getElementById('bot-container');

        botConfigs.forEach(bot => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${bot.name}</h3>
                <p>${bot.strategy}</p>
                <button>${bot.type === 'Premium' ? 'ACTIVATE PRO' : 'LOAD BOT'}</button>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
